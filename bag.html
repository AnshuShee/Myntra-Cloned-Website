<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myntra - Shopping Bag</title>
  <link rel="stylesheet" href="bag.css">
  <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<body>
  <header class="main-header">
    <div class="header-left">
      <img src="logo.png" alt="Myntra Logo" class="logo">
    </div>
    <nav class="checkout-nav">
      <div class="nav-step selected">BAG</div>
      <div class="nav-step">ADDRESS</div>
      <div class="nav-step">PAYMENT</div>
    </nav>
    <div class="header-right">
      <span class="secure-icon">
        <img src="https://constant.myntassets.com/checkout/assets/img/sprite-secure.png" alt="Secure Icon">
      </span>
      <span class="secure-text">100% SECURE</span>
    </div>
  </header>
  <main class="center-content">
    <div class="bag-section">
      <img src="https://constant.myntassets.com/checkout/assets/img/empty-bag.webp" alt="Empty Bag Illustration" class="bag-img">
      <h2>Hey, it feels so light!</h2>
      <p>There is nothing in your bag. Let's add some items.</p>
      <button class="wishlist-btn">ADD ITEMS FROM WISHLIST</button>
    </div>
  </main>
  <footer class="bag-footer">
    <div class="footer-payment">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-cod.png" alt="SSL" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-visa.png" alt="Visa" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-mc.png" alt="Mastercard" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-ae.png" alt="Amex" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-dc.png" alt="Diners Club" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-nb.png" alt="Netbanking" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-cod.png" alt="COD" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-rupay.png" alt="RuPay" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-paypal.png" alt="PayPal" class="payment-icon">
      <img src="https://constant.myntassets.com/checkout/assets/img/footer-bank-bhim.png" alt="BHIM" class="payment-icon">
    </div>
    <div class="footer-contact">
      Need Help ? <a href="#">Contact Us</a>
    </div>
  </footer>
</body>
</html>
